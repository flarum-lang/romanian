      client_extension: "În mod implicit, Modulul de Încărcare va alege o extensie de fișier sigură bazată pe tipul MIME.\nPentru unele tipuri de fișiere bazate pe formate ZIP sau date binare, acest lucru poate duce la utilizarea unor extensii generice în locul celei așteptate.\nAici poți introduce o listă de extensii, separate prin virgulă, care vor fi păstrate întocmai.\n"
