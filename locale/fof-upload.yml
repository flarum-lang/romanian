fof-upload:
  admin:
    help_texts:
      client_extension: "În mod implicit, Modulul de Încărcare va alege o extensie de fișier sigură bazată pe tipul MIME.\nPentru unele tipuri de fișiere bazate pe formate ZIP sau date binare, acest lucru poate duce la utilizarea unor extensii generice în locul celei așteptate.\nAici poți introduce o listă de extensii, separate prin virgulă, care vor fi păstrate întocmai.\n"
      composer_buttons: "În mod implicit, atât butonul managerului media, cât și butonul de încărcare sunt vizibile. Poți alege, de asemenea, să afișezi un singur buton.\n"
      custom_s3_url: "Utilizează această setare dacă folosești un serviciu compatibil S3 care necesită un format specific de URL (de exemplu, Backblaze B2) sau dacă întâmpini probleme cu formatul implicit al URL-ului. Această setare nu este, în general, necesară pentru majoritatea serviciilor. Asigură-te că URL-ul include protocolul (https://) și este formatat corect. Exemplu: https://your-bucket.s3.your-region.backblazeb2.com\n"
      disable-download-logging: "Dezactivează jurnalizarea fiecărei descărcări efectuate de utilizatorii forumului. Menținerea activă îți permite să vizualizezi numărul de descărcări și alte metrici în viitorul apropiat.\n"
      disable-hotlink-protection: "Protecția hotlink previne deschiderea descărcărilor de pe alte site-uri. Metoda actuală necesită un token CSRF și ID-ul postării.\n"
      download_templates: "Șabloanele de descărcare determină modul în care sunt afișate încărcările pe forum, de exemplu sub formă de previzualizări sau butoane. Momentan disponibile:\n"
      mime_types: "Te rugăm să îți configurezi maparea aici. Fiecare expresie regulată de tip MIME va fi gestionată de un adaptor de încărcare și un șablon de descărcare specific.\n"
      resize: "Alege dacă dorești să redimensionezi imaginile înainte de a fi încărcate. Poți alege o lățime și o înălțime maximă, în pixeli. Procesul de redimensionare păstrează raportul de aspect al imaginilor.\n"
      s3_acl: "ACL-ul care ar trebui aplicat obiectului încărcat (implicit: privat). Pentru valorile posibile, consultă https://docs.aws.amazon.com/AmazonS3/latest/dev/acl-overview.html#canned-acl\n"
      s3_compatible_storage: "Următoarele setări sunt necesare doar atunci când utilizezi un mediu de stocare compatibil S3. Dacă utilizezi AWS, le poți lăsa necompletate.\n"
      s3_instance_profile: "Lasă cheia și secretul necompletate pentru a utiliza acreditările din profilul instanței.\n"
      watermark: "Alege dacă imaginile vor avea un watermark adăugat în timpul încărcării. Watermark-urile sunt adăugate fișierelor care nu sunt de tip GIF, pe baza preferințelor tale de mai jos.\n"
